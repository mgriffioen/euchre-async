<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Euchre Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a3a2a;
    --green-mid: #2a5c3f;
    --green-light: #3d7a56;
    --felt: #0f2a1e;
    --gold: #c9a84c;
    --gold-light: #e8c87a;
    --cream: #f5f0e8;
    --cream-dim: #d9d2c0;
    --red: #b33a3a;
    --red-light: #d45a5a;
    --white: #ffffff;
    --shadow: rgba(0,0,0,0.5);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--felt);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ── LAYOUT ── */
  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #0a1f15 0%, #0f2a1e 100%);
    border-bottom: 2px solid var(--gold);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .header-sub {
    font-size: 11px;
    color: var(--cream-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .round-badge {
    background: var(--gold);
    color: var(--felt);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 40px;
    letter-spacing: 0.05em;
  }

  /* ── ROUND NAV ── */
  .round-nav {
    display: flex;
    gap: 6px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .round-nav::-webkit-scrollbar { display: none; }
  .round-btn {
    flex-shrink: 0;
    padding: 7px 18px;
    border-radius: 40px;
    border: 1px solid rgba(201,168,76,0.35);
    background: transparent;
    color: var(--cream-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.03em;
  }
  .round-btn:hover { border-color: var(--gold); color: var(--gold); }
  .round-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--felt);
    font-weight: 700;
  }
  .round-btn.has-scores { border-style: solid; border-color: rgba(201,168,76,0.6); }
  .round-btn.has-scores::after { content: ' ✓'; font-size: 10px; opacity: 0.7; }

  /* ── MAIN CONTENT ── */
  #main {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── VIEWS ── */
  .view { display: none; flex: 1; overflow-y: auto; padding: 16px 20px; }
  .view.active { display: flex; flex-direction: column; gap: 14px; }

  /* ── TABLE CARD ── */
  .table-card {
    background: linear-gradient(160deg, #1c3d2b 0%, #16302200 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 16px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .table-header {
    background: rgba(201,168,76,0.12);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-name {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold);
    font-weight: 500;
  }
  .winner-badge {
    font-size: 11px;
    background: var(--gold);
    color: var(--felt);
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.04em;
    display: none;
  }
  .winner-badge.visible { display: inline-block; }

  .matchup {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
    gap: 0;
  }

  .team-side {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .team-side.right { align-items: flex-end; }

  .player-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 17px;
    font-weight: 400;
    color: var(--cream);
  }
  .team-side.right .player-row { flex-direction: row-reverse; }

  .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .vs-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 12px;
    border-left: 1px solid rgba(201,168,76,0.15);
    border-right: 1px solid rgba(201,168,76,0.15);
    gap: 10px;
    background: rgba(0,0,0,0.12);
    min-width: 90px;
  }
  .vs-label {
    font-size: 10px;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .score-pair {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .score-box {
    width: 38px; height: 38px;
    border-radius: 8px;
    border: 1px solid rgba(201,168,76,0.4);
    background: rgba(0,0,0,0.3);
    color: var(--cream);
    font-size: 20px;
    font-weight: 300;
    text-align: center;
    font-family: 'Playfair Display', serif;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .score-box:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.12);
  }
  .score-box.winning { color: var(--gold); border-color: var(--gold); }

  .score-dash { color: rgba(201,168,76,0.4); font-size: 14px; }

  /* ── STANDINGS VIEW ── */
  #standings-view {
    padding: 16px 20px;
  }
  .standings-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 14px;
    letter-spacing: 0.03em;
  }
  .standing-row {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    border-radius: 10px;
    margin-bottom: 7px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.1);
    transition: background 0.15s;
    gap: 12px;
  }
  .standing-row.rank-1 {
    background: rgba(201,168,76,0.14);
    border-color: rgba(201,168,76,0.4);
  }
  .rank-num {
    width: 24px;
    font-size: 13px;
    color: var(--cream-dim);
    flex-shrink: 0;
    text-align: center;
  }
  .rank-1 .rank-num { color: var(--gold); font-weight: 700; font-size: 15px; }
  .standing-pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .standing-name {
    flex: 1;
    font-size: 17px;
    font-weight: 400;
    color: var(--cream);
  }
  .rank-1 .standing-name { font-weight: 500; color: var(--gold-light); }
  .standing-wins {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cream-dim);
    min-width: 28px;
    text-align: right;
  }
  .rank-1 .standing-wins { color: var(--gold); }
  .wins-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cream-dim);
    opacity: 0.6;
    flex-shrink: 0;
  }

  /* ── BOTTOM NAV ── */
  footer {
    background: rgba(0,0,0,0.4);
    border-top: 1px solid rgba(201,168,76,0.25);
    display: flex;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 14px;
    background: transparent;
    border: none;
    color: var(--cream-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .nav-btn svg { opacity: 0.6; transition: opacity 0.15s; }
  .nav-btn.active { color: var(--gold); }
  .nav-btn.active svg { opacity: 1; }
  .nav-btn:not(.active):hover { color: var(--cream); }

  /* ── SUIT DECORATION ── */
  .suit-deco {
    font-size: 28px;
    opacity: 0.06;
    position: fixed;
    pointer-events: none;
    user-select: none;
  }

  /* ── RESET BTN ── */
  .reset-area {
    padding: 8px 20px 0;
    display: flex;
    justify-content: flex-end;
    flex-shrink: 0;
  }
  .reset-link {
    font-size: 11px;
    color: rgba(201,168,76,0.4);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: color 0.15s;
  }
  .reset-link:hover { color: var(--red-light); }
</style>
</head>
<body>

<div id="app">
  <header>
    <div>
      <div class="header-title">♠ Euchre</div>
      <div class="header-sub">Tournament · 8 Players</div>
    </div>
    <div class="round-badge" id="header-badge">Round 1</div>
  </header>

  <div class="round-nav" id="round-nav"></div>

  <div id="main">
    <!-- ROUNDS VIEWS (0–6) filled by JS -->
    <!-- STANDINGS VIEW -->
    <div class="view" id="standings-view">
      <div class="standings-title">Standings</div>
      <div id="standings-list"></div>
    </div>
  </div>

  <div class="reset-area">
    <button class="reset-link" id="reset-btn">Reset all scores</button>
  </div>

  <footer>
    <button class="nav-btn active" id="nav-rounds" onclick="showSection('rounds')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Rounds
    </button>
    <button class="nav-btn" id="nav-standings" onclick="showSection('standings')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Standings
    </button>
  </footer>
</div>

<span class="suit-deco" style="top:15%;right:4%">♣</span>
<span class="suit-deco" style="bottom:20%;left:3%">♦</span>

<script>
const PLAYERS = ['Mark','Erik','Sean','Carl','Brandon','Paul','Benedict','Dusty'];

const COLORS = {
  'Mark':     '#378ADD',
  'Erik':     '#D4537E',
  'Sean':     '#1D9E75',
  'Carl':     '#D85A30',
  'Brandon':  '#7F77DD',
  'Paul':     '#BA7517',
  'Benedict': '#639922',
  'Dusty':    '#888780'
};

const ROUNDS = [
  [['Mark','Erik'],['Sean','Carl']],
  [['Brandon','Paul'],['Benedict','Dusty']],
  [['Mark','Brandon'],['Erik','Benedict']],
  [['Sean','Dusty'],['Carl','Paul']],
  [['Mark','Sean'],['Brandon','Carl']],
  [['Erik','Dusty'],['Paul','Benedict']],
  [['Mark','Paul'],['Carl','Benedict']],
  [['Erik','Brandon'],['Sean','Dusty']],
  [['Mark','Dusty'],['Erik','Carl']],
  [['Sean','Paul'],['Brandon','Benedict']],
  [['Mark','Carl'],['Paul','Sean']],
  [['Erik','Benedict'],['Brandon','Dusty']],
  [['Mark','Benedict'],['Erik','Paul']],
  [['Sean','Brandon'],['Carl','Dusty']],
];

// Group into 7 rounds of 2 tables
const ROUND_DATA = [];
for (let i = 0; i < 7; i++) {
  ROUND_DATA.push({
    table1: { t1: ROUNDS[i*2][0], t2: ROUNDS[i*2][1] },
    table2: { t1: ROUNDS[i*2+1][0], t2: ROUNDS[i*2+1][1] }
  });
}

// Load scores from localStorage
let scores = JSON.parse(localStorage.getItem('euchre_scores') || 'null');
if (!scores) {
  scores = ROUND_DATA.map(() => [['',''],['','']]);
}

function save() {
  localStorage.setItem('euchre_scores', JSON.stringify(scores));
}

let currentRound = 0;
let section = 'rounds';

function buildUI() {
  const main = document.getElementById('main');
  // Remove old round views
  main.querySelectorAll('.round-view').forEach(el => el.remove());
  const standingsView = document.getElementById('standings-view');

  ROUND_DATA.forEach((round, ri) => {
    const view = document.createElement('div');
    view.className = 'view round-view';
    view.id = `round-view-${ri}`;
    view.innerHTML = buildRoundHTML(round, ri);
    main.insertBefore(view, standingsView);
  });

  buildRoundNav();
  attachScoreListeners();
  activateRoundView(currentRound);
}

function buildRoundHTML(round, ri) {
  return `
    ${buildTableCard(round.table1, ri, 0, 'Table 1')}
    ${buildTableCard(round.table2, ri, 1, 'Table 2')}
  `;
}

function buildTableCard(table, ri, ti, label) {
  const s = scores[ri][ti];
  const s0 = s[0] === '' ? '' : +s[0];
  const s1 = s[1] === '' ? '' : +s[1];
  const t1wins = s0 !== '' && s1 !== '' && s0 > s1;
  const t2wins = s0 !== '' && s1 !== '' && s1 > s0;
  const winnerText = t1wins ? `${table.t1.join(' & ')} win` : t2wins ? `${table.t2.join(' & ')} win` : '';

  return `
  <div class="table-card" id="card-${ri}-${ti}">
    <div class="table-header">
      <span class="table-name">${label}</span>
      <span class="winner-badge${winnerText ? ' visible' : ''}" id="wb-${ri}-${ti}">${winnerText}</span>
    </div>
    <div class="matchup">
      <div class="team-side left">
        ${table.t1.map(p => `<div class="player-row"><div class="pip" style="background:${COLORS[p]}"></div>${p}</div>`).join('')}
      </div>
      <div class="vs-col">
        <span class="vs-label">vs</span>
        <div class="score-pair">
          <input class="score-box${t1wins?' winning':''}" type="number" min="0" max="10" inputmode="numeric" pattern="[0-9]*" value="${s[0]}" data-ri="${ri}" data-ti="${ti}" data-side="0" placeholder="0">
          <span class="score-dash">–</span>
          <input class="score-box${t2wins?' winning':''}" type="number" min="0" max="10" inputmode="numeric" pattern="[0-9]*" value="${s[1]}" data-ri="${ri}" data-ti="${ti}" data-side="1" placeholder="0">
        </div>
      </div>
      <div class="team-side right">
        ${table.t2.map(p => `<div class="player-row"><div class="pip" style="background:${COLORS[p]}"></div>${p}</div>`).join('')}
      </div>
    </div>
  </div>`;
}

function buildRoundNav() {
  const nav = document.getElementById('round-nav');
  nav.innerHTML = ROUND_DATA.map((_, ri) => {
    const hasScores = scores[ri].some(t => t[0] !== '' && t[1] !== '');
    return `<button class="round-btn${ri===currentRound?' active':''}${hasScores?' has-scores':''}" onclick="switchRound(${ri})">R${ri+1}</button>`;
  }).join('');
}

function attachScoreListeners() {
  document.querySelectorAll('.score-box').forEach(inp => {
    inp.addEventListener('input', e => {
      const ri = +e.target.dataset.ri, ti = +e.target.dataset.ti, side = +e.target.dataset.side;
      scores[ri][ti][side] = e.target.value === '' ? '' : e.target.value;
      save();
      refreshCard(ri, ti);
      buildRoundNav();
      if (section === 'standings') renderStandings();
    });
  });
}

function refreshCard(ri, ti) {
  const s = scores[ri][ti];
  const s0 = s[0] === '' ? '' : +s[0];
  const s1 = s[1] === '' ? '' : +s[1];
  const t1wins = s0 !== '' && s1 !== '' && s0 > s1;
  const t2wins = s0 !== '' && s1 !== '' && s1 > s0;

  const box0 = document.querySelector(`.score-box[data-ri="${ri}"][data-ti="${ti}"][data-side="0"]`);
  const box1 = document.querySelector(`.score-box[data-ri="${ri}"][data-ti="${ti}"][data-side="1"]`);
  if (box0) box0.classList.toggle('winning', t1wins);
  if (box1) box1.classList.toggle('winning', t2wins);

  const table = ti === 0 ? ROUND_DATA[ri].table1 : ROUND_DATA[ri].table2;
  const winnerText = t1wins ? `${table.t1.join(' & ')} win` : t2wins ? `${table.t2.join(' & ')} win` : '';
  const wb = document.getElementById(`wb-${ri}-${ti}`);
  if (wb) { wb.textContent = winnerText; wb.classList.toggle('visible', !!winnerText); }
}

function switchRound(ri) {
  currentRound = ri;
  activateRoundView(ri);
  buildRoundNav();
}

function activateRoundView(ri) {
  document.querySelectorAll('.round-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`round-view-${ri}`).classList.add('active');
  document.getElementById('standings-view').classList.remove('active');
  document.getElementById('header-badge').textContent = `Round ${ri+1}`;
}

function showSection(sec) {
  section = sec;
  document.getElementById('nav-rounds').classList.toggle('active', sec === 'rounds');
  document.getElementById('nav-standings').classList.toggle('active', sec === 'standings');
  if (sec === 'rounds') {
    activateRoundView(currentRound);
  } else {
    document.querySelectorAll('.round-view').forEach(v => v.classList.remove('active'));
    const sv = document.getElementById('standings-view');
    sv.classList.add('active');
    document.getElementById('header-badge').textContent = 'Standings';
    renderStandings();
  }
}

function renderStandings() {
  const wins = {};
  PLAYERS.forEach(p => wins[p] = 0);

  ROUND_DATA.forEach((round, ri) => {
    [round.table1, round.table2].forEach((table, ti) => {
      const s = scores[ri][ti];
      const s0 = s[0] === '' ? null : +s[0];
      const s1 = s[1] === '' ? null : +s[1];
      if (s0 === null || s1 === null) return;
      if (s0 > s1) table.t1.forEach(p => wins[p]++);
      else if (s1 > s0) table.t2.forEach(p => wins[p]++);
    });
  });

  const sorted = PLAYERS.slice().sort((a, b) => wins[b] - wins[a]);
  const maxW = Math.max(...Object.values(wins));

  document.getElementById('standings-list').innerHTML = sorted.map((p, i) => {
    const isFirst = i === 0 && maxW > 0;
    return `<div class="standing-row${isFirst ? ' rank-1' : ''}">
      <div class="rank-num">${isFirst ? '♛' : i+1}</div>
      <div class="standing-pip" style="background:${COLORS[p]}"></div>
      <div class="standing-name">${p}</div>
      <div class="standing-wins">${wins[p]}</div>
      <div class="wins-label">wins</div>
    </div>`;
  }).join('');
}

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Reset all scores?')) {
    scores = ROUND_DATA.map(() => [['',''],['','']]);
    save();
    buildUI();
    if (section === 'standings') renderStandings();
  }
});

buildUI();
</script>
</body>
</html>
