<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Euchre Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --felt: #0f2a1e;
    --gold: #c9a84c;
    --gold-light: #e8c87a;
    --cream: #f5f0e8;
    --cream-dim: #d9d2c0;
    --red-light: #d45a5a;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--felt);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #0a1f15 0%, #0f2a1e 100%);
    border-bottom: 2px solid var(--gold);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .header-sub {
    font-size: 11px;
    color: var(--cream-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .round-badge {
    background: var(--gold);
    color: var(--felt);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 14px;
    padding: 6px 18px;
    border-radius: 40px;
    letter-spacing: 0.05em;
  }

  /* ── ROUND NAV ── */
  .round-nav {
    display: flex;
    gap: 6px;
    padding: 8px 20px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .round-nav::-webkit-scrollbar { display: none; }
  .round-btn {
    flex-shrink: 0;
    padding: 7px 20px;
    border-radius: 40px;
    border: 1px solid rgba(201,168,76,0.35);
    background: transparent;
    color: var(--cream-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.03em;
    min-height: 42px;
  }
  .round-btn:hover { border-color: var(--gold); color: var(--gold); }
  .round-btn.active { background: var(--gold); border-color: var(--gold); color: var(--felt); font-weight: 700; }
  .round-btn.has-scores { border-color: rgba(201,168,76,0.6); }
  .round-btn.has-scores::after { content: ' ✓'; font-size: 11px; opacity: 0.7; }

  /* ── MAIN ── */
  #main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

  .view { display: none; flex: 1; overflow: hidden; padding: 12px 20px; min-height: 0; }
  .view.active { display: flex; flex-direction: column; gap: 12px; }

  /* ── TABLE CARD — each takes half the available height ── */
  .table-card {
    background: linear-gradient(160deg, #1c3d2b 0%, rgba(22,48,34,0) 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 16px;
    overflow: hidden;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .table-header {
    background: rgba(201,168,76,0.12);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
  }
  .table-name {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold);
    font-weight: 500;
  }
  .winner-badge {
    font-size: 13px;
    background: var(--gold);
    color: var(--felt);
    padding: 3px 12px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.04em;
    display: none;
  }
  .winner-badge.visible { display: inline-block; }
  .table-reset-btn {
    background: none;
    border: 1px solid rgba(201,168,76,0.25);
    cursor: pointer;
    color: rgba(201,168,76,0.45);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 6px;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    min-height: 36px;
  }
  .table-reset-btn:hover { color: var(--red-light); border-color: var(--red-light); }

  /* ── MATCHUP LAYOUT — fills the card ── */
  .matchup {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    flex: 1;
    min-height: 0;
  }

  .team-side {
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }
  .team-side.right { align-items: flex-end; }

  .player-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .team-side.right .player-row { flex-direction: row-reverse; }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 2.5px solid rgba(201,168,76,0.5);
    flex-shrink: 0;
    display: block;
  }
  .handshake {
    font-size: 22px;
    line-height: 1;
    opacity: 0.85;
  }
  .pip { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

  /* ── SCORE STEPPER ── */
  .vs-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    border-left: 1px solid rgba(201,168,76,0.15);
    border-right: 1px solid rgba(201,168,76,0.15);
    gap: 8px;
    background: rgba(0,0,0,0.15);
    min-width: 180px;
  }
  .vs-label {
    font-size: 11px;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .score-pair {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stepper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .step-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.4);
    background: rgba(0,0,0,0.25);
    color: var(--gold);
    font-size: 24px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    line-height: 1;
    user-select: none;
    -webkit-user-select: none;
  }
  .step-btn:active { background: rgba(201,168,76,0.2); transform: scale(0.92); }
  .step-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.1); }
  .step-btn.minus { color: rgba(201,168,76,0.55); }
  .score-display {
    width: 58px;
    height: 58px;
    border-radius: 10px;
    border: 1.5px solid rgba(201,168,76,0.4);
    background: rgba(0,0,0,0.3);
    color: var(--cream);
    font-size: 30px;
    font-weight: 300;
    font-family: 'Playfair Display', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
    cursor: default;
  }
  .score-display.winning { color: var(--gold); border-color: var(--gold); }
  .score-dash { color: rgba(201,168,76,0.35); font-size: 16px; margin: 0 2px; }

  /* ── STANDINGS VIEW ── */
  #standings-view { padding: 20px 28px; }
  .standings-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--gold);
    margin-bottom: 18px;
    letter-spacing: 0.03em;
  }
  .standing-row {
    display: flex;
    align-items: center;
    padding: 16px 22px;
    border-radius: 14px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.1);
    gap: 16px;
  }
  .standing-row.rank-1 { background: rgba(201,168,76,0.14); border-color: rgba(201,168,76,0.4); }
  .rank-num { width: 32px; font-size: 16px; color: var(--cream-dim); flex-shrink: 0; text-align: center; }
  .rank-1 .rank-num { color: var(--gold); font-weight: 700; font-size: 20px; }
  .standing-pip { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .standing-name { flex: 1; font-size: 22px; font-weight: 400; color: var(--cream); }
  .rank-1 .standing-name { font-weight: 500; color: var(--gold-light); }
  .standing-wins { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--cream-dim); min-width: 36px; text-align: right; }
  .rank-1 .standing-wins { color: var(--gold); }
  .wins-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--cream-dim); opacity: 0.6; flex-shrink: 0; }

  /* ── BOTTOM NAV ── */
  footer { background: rgba(0,0,0,0.4); border-top: 1px solid rgba(201,168,76,0.25); display: flex; flex-shrink: 0; }
  .nav-btn {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    color: var(--cream-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-height: 58px;
  }
  .nav-btn svg { opacity: 0.6; transition: opacity 0.15s; }
  .nav-btn.active { color: var(--gold); }
  .nav-btn.active svg { opacity: 1; }
  .nav-btn:not(.active):hover { color: var(--cream); }

  .suit-deco { font-size: 36px; opacity: 0.06; position: fixed; pointer-events: none; user-select: none; }

  .reset-area { padding: 6px 20px 0; display: flex; justify-content: flex-end; flex-shrink: 0; }
  .reset-link {
    font-size: 12px;
    color: rgba(201,168,76,0.4);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.15s;
    padding: 6px 4px;
    min-height: 36px;
  }
  .reset-link:hover { color: var(--red-light); }
</style>
</head>
<body>

<div id="app">
  <header>
    <div>
      <div class="header-title">♠ Euchre</div>
      <div class="header-sub">Tournament · 8 Players</div>
    </div>
    <div class="round-badge" id="header-badge">Round 1</div>
  </header>

  <div class="round-nav" id="round-nav"></div>

  <div id="main">
    <!-- ROUNDS VIEWS (0–6) filled by JS -->
    <!-- STANDINGS VIEW -->
    <div class="view" id="standings-view">
      <div class="standings-title">Standings</div>
      <div id="standings-list"></div>
    </div>
  </div>

  <div class="reset-area">
    <button class="reset-link" id="reset-btn">Reset all scores</button>
  </div>

  <footer>
    <button class="nav-btn active" id="nav-rounds" onclick="showSection('rounds')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Rounds
    </button>
    <button class="nav-btn" id="nav-standings" onclick="showSection('standings')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Standings
    </button>
  </footer>
</div>

<span class="suit-deco" style="top:15%;right:4%">♣</span>
<span class="suit-deco" style="bottom:20%;left:3%">♦</span>

<script>
const PLAYERS = ['Mark','Erik','Sean','Carl','Brandon','Paul','Benedict','Dusty'];

const COLORS = {
  'Mark':     '#378ADD',
  'Erik':     '#D4537E',
  'Sean':     '#1D9E75',
  'Carl':     '#D85A30',
  'Brandon':  '#7F77DD',
  'Paul':     '#BA7517',
  'Benedict': '#639922',
  'Dusty':    '#888780'
};

const AVATARS = {
  'Mark':     'https://lh3.googleusercontent.com/pw/AP1GczOTVxDKqxIPMsQYWQC7rVagvAuD-4DyiShK0v1qlNQehmuDrRaRKYKSx0U03YytNZkIYhD9c-JaIzW6sR0OvNcQw6ZTBYfAwhp3HempVTuMlunj3OIPCNvDMKxY4BoKuymTepw5vLkHH1HBDOQkpRPB4A=w2084-h2084-s-no-gm?authuser=0',
  'Erik':     'https://lh3.googleusercontent.com/pw/AP1GczNuiggpPZMY0p-bp1y1fYreUrgGi45VBYgPQaWB7CkDS-lzDL9Wti5zEhZW-Hys3BsSlehYK0VBw3YwmK2mE61IpSl3xj87Lqhh7NJPX5il4r7mmFxVW4LIVCAeUuuqR5M7PeIauYvZ1BwvkxpZ4x9Hmg=w2306-h2307-s-no-gm?authuser=0',
  'Sean':     'https://lh3.googleusercontent.com/pw/AP1GczMl3EPNgZqL5sfEgp1mTr1zCK-Rv_GsAWyQr5BcPV_LCZKGzx7KQXycCUmJWfLtuzGomhwnv84txhXRcBVhp6JMQFw3Vctj3gXnnBUlvop-rvUCBSpWfK6WCW1DBqXDnoiBllxvqBWu3EM2FlKJGvlDlg=w1871-h1871-s-no-gm?authuser=0',
  'Carl':     'https://lh3.googleusercontent.com/pw/AP1GczNHjK6dC-9LeFg52OUUAgvTt8Gi2x-zD0TZJNjas_5f07LjFQeW6tZO6DIDVL0UbNablWrCMz_13j0YU-xiFfNjJfhIpaRGZkPg4MUtX2cjBgX9gmNJACFFxp6ti67PdEjlIJuECEIIS1ws_MVIDrTksQ=w2632-h2632-s-no-gm?authuser=0',
  'Brandon':  'https://lh3.googleusercontent.com/pw/AP1GczOVf8fc1WgFvW153mcZLGrYUZIMsGEybFruhqnm9EUNowRcSFi7GzPYJ8w70aStVJERcGj5Dho7UW7D3Wu8QPMNi0xOcC72PxvLoDIUO5JxNvF9id5-kwA1ja-wWLUS5FFhjcjqmaRfymu7JBqS0POdbw=w2632-h2632-s-no-gm?authuser=0',
  'Paul':     'https://lh3.googleusercontent.com/pw/AP1GczOoBOuqdYqjYxrnG3MI-Vh9MRk8ggHatSMF25I49EGL8LC02vZFCaqnfB6izUYSZDVzLdvmH4JlwC0UoyPl3nwGsWaRQN1BvEIJMsz-o515xuSesUT4wx1-2Mucswgnz50pYh5W93hXwVs3_Oa77Cgk9g=w2126-h2126-s-no-gm?authuser=0',
  'Benedict': 'https://lh3.googleusercontent.com/pw/AP1GczNPxsE56XpGK8GG7DnbpqgnaGHGSyPyy7kg8-8AvgcxqOB0OLBBt8uufl4bNIaXujWk3DhlXIdR9D9SMyxgCRzLKDTYwffBbcKPRxvgbtZLFQOhI8XrqZ8B9C52ZXeS9jEDO7hoZ2J7t6-ZPCXO7449cg=w1325-h1325-s-no-gm?authuser=0',
  'Dusty':    'https://lh3.googleusercontent.com/pw/AP1GczP51KgtcuUUNYiBS6TfGKHvWY6ABuA1BE2ZakGMGe_SghJpIHlkHIagI45LUu-un6Z3WtdEb3ETJCDu89RChW_gnf04M3zw4tbv1w6vPgQFQeyQc-qSjmMOlErMl_sZTuuK4R2GxctH2VlMBSs-3gm9Nw=w1230-h1230-s-no-gm?authuser=0',
};

const ROUNDS = [
  [['Mark','Erik'],['Sean','Carl']],
  [['Brandon','Paul'],['Benedict','Dusty']],
  [['Mark','Brandon'],['Erik','Benedict']],
  [['Sean','Dusty'],['Carl','Paul']],
  [['Mark','Sean'],['Brandon','Carl']],
  [['Erik','Dusty'],['Paul','Benedict']],
  [['Mark','Paul'],['Carl','Benedict']],
  [['Erik','Brandon'],['Sean','Dusty']],
  [['Mark','Dusty'],['Erik','Carl']],
  [['Sean','Paul'],['Brandon','Benedict']],
  [['Mark','Carl'],['Paul','Sean']],
  [['Erik','Benedict'],['Brandon','Dusty']],
  [['Mark','Benedict'],['Erik','Paul']],
  [['Sean','Brandon'],['Carl','Dusty']],
];

// Group into 7 rounds of 2 tables
const ROUND_DATA = [];
for (let i = 0; i < 7; i++) {
  ROUND_DATA.push({
    table1: { t1: ROUNDS[i*2][0], t2: ROUNDS[i*2][1] },
    table2: { t1: ROUNDS[i*2+1][0], t2: ROUNDS[i*2+1][1] }
  });
}

// Load scores from localStorage
let scores = JSON.parse(localStorage.getItem('euchre_scores') || 'null');
if (!scores) {
  scores = ROUND_DATA.map(() => [[0,0],[0,0]]);
}

function save() {
  localStorage.setItem('euchre_scores', JSON.stringify(scores));
}

let currentRound = 0;
let section = 'rounds';

function buildUI() {
  const main = document.getElementById('main');
  // Remove old round views
  main.querySelectorAll('.round-view').forEach(el => el.remove());
  const standingsView = document.getElementById('standings-view');

  ROUND_DATA.forEach((round, ri) => {
    const view = document.createElement('div');
    view.className = 'view round-view';
    view.id = `round-view-${ri}`;
    view.innerHTML = buildRoundHTML(round, ri);
    main.insertBefore(view, standingsView);
  });

  buildRoundNav();
  attachScoreListeners();
  activateRoundView(currentRound);
}

function buildRoundHTML(round, ri) {
  return `
    ${buildTableCard(round.table1, ri, 0, 'Table 1')}
    ${buildTableCard(round.table2, ri, 1, 'Table 2')}
  `;
}

function avatarImgTag(p, size) {
  return '<img src="' + AVATARS[p] + '" style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;object-fit:cover;border:1.5px solid var(--felt);margin-right:-6px;vertical-align:middle;">';
}

function buildTableCard(table, ri, ti, label) {
  const s = scores[ri][ti];
  const s0 = s[0] === '' ? '' : +s[0];
  const s1 = s[1] === '' ? '' : +s[1];
  const t1wins = s0 !== '' && s0 >= 10 && (s1 === '' || s0 > s1);
  const t2wins = s1 !== '' && s1 >= 10 && (s0 === '' || s1 > s0);
  const winnerTeam = t1wins ? table.t1 : t2wins ? table.t2 : null;
  const winnerHTML = winnerTeam
    ? winnerTeam.map(p => avatarImgTag(p, 24)).join('') + ' &nbsp;' + winnerTeam.join(' & ') + ' win'
    : '';

  const a1 = AVATARS[table.t1[0]], n1 = table.t1[0];
  const a2 = AVATARS[table.t1[1]], n2 = table.t1[1];
  const a3 = AVATARS[table.t2[0]], n3 = table.t2[0];
  const a4 = AVATARS[table.t2[1]], n4 = table.t2[1];

  return `
  <div class="table-card" id="card-${ri}-${ti}">
    <div class="table-header">
      <span class="table-name">${label}</span>
      <span class="winner-badge${winnerHTML ? ' visible' : ''}" id="wb-${ri}-${ti}">${winnerHTML}</span>
      <button class="table-reset-btn" onclick="resetTable(${ri},${ti})" title="Clear scores for this table">✕ Clear</button>
    </div>
    <div class="matchup">
      <div class="team-side left">
        <div class="player-row">
          <img class="avatar" src="${a1}" alt="${n1}" title="${n1}">
          <span class="handshake">🤝</span>
          <img class="avatar" src="${a2}" alt="${n2}" title="${n2}">
        </div>
      </div>
      <div class="vs-col">
        <span class="vs-label">vs</span>
        <div class="score-pair">
          <div class="stepper">
            <button class="step-btn plus" onclick="stepScore(${ri},${ti},0,1)">+</button>
            <div class="score-display${t1wins?' winning':''}" id="sd-${ri}-${ti}-0">${s[0] === '' ? '0' : s[0]}</div>
            <button class="step-btn minus" onclick="stepScore(${ri},${ti},0,-1)">−</button>
          </div>
          <span class="score-dash">–</span>
          <div class="stepper">
            <button class="step-btn plus" onclick="stepScore(${ri},${ti},1,1)">+</button>
            <div class="score-display${t2wins?' winning':''}" id="sd-${ri}-${ti}-1">${s[1] === '' ? '0' : s[1]}</div>
            <button class="step-btn minus" onclick="stepScore(${ri},${ti},1,-1)">−</button>
          </div>
        </div>
      </div>
      <div class="team-side right">
        <div class="player-row">
          <img class="avatar" src="${a3}" alt="${n3}" title="${n3}">
          <span class="handshake">🤝</span>
          <img class="avatar" src="${a4}" alt="${n4}" title="${n4}">
        </div>
      </div>
    </div>
  </div>`;
}

function stepScore(ri, ti, side, delta) {
  const current = scores[ri][ti][side] === '' ? 0 : +scores[ri][ti][side];
  const next = Math.max(0, current + delta);
  scores[ri][ti][side] = next;
  save();
  refreshCard(ri, ti);
  buildRoundNav();
  if (section === 'standings') renderStandings();
  checkAutoAdvance(ri);
}

function roundHasWinner(ri, ti) {
  const s0 = +scores[ri][ti][0];
  const s1 = +scores[ri][ti][1];
  return (s0 >= 10 && s0 > s1) || (s1 >= 10 && s1 > s0);
}

function checkAutoAdvance(ri) {
  if (ri !== currentRound) return;
  if (section !== 'rounds') return;
  if (!roundHasWinner(ri, 0) || !roundHasWinner(ri, 1)) return;
  const nextRound = ri + 1;
  if (nextRound >= ROUND_DATA.length) return;
  setTimeout(() => {
    switchRound(nextRound);
  }, 900);
}

function resetTable(ri, ti) {
  scores[ri][ti] = [0, 0];
  save();
  const d0 = document.getElementById(`sd-${ri}-${ti}-0`);
  const d1 = document.getElementById(`sd-${ri}-${ti}-1`);
  if (d0) { d0.textContent = '0'; d0.classList.remove('winning'); }
  if (d1) { d1.textContent = '0'; d1.classList.remove('winning'); }
  const wb = document.getElementById(`wb-${ri}-${ti}`);
  if (wb) { wb.textContent = ''; wb.classList.remove('visible'); }
  buildRoundNav();
  if (section === 'standings') renderStandings();
}

function buildRoundNav() {
  const nav = document.getElementById('round-nav');
  nav.innerHTML = ROUND_DATA.map((_, ri) => {
    const hasScores = scores[ri].some(t => +t[0] > 0 || +t[1] > 0);
    return `<button class="round-btn${ri===currentRound?' active':''}${hasScores?' has-scores':''}" onclick="switchRound(${ri})">R${ri+1}</button>`;
  }).join('');
}

function attachScoreListeners() {
  // steppers use inline onclick — no listeners needed
}

function refreshCard(ri, ti) {
  const s = scores[ri][ti];
  const s0 = +s[0];
  const s1 = +s[1];
  const t1wins = s0 >= 10 && s0 > s1;
  const t2wins = s1 >= 10 && s1 > s0;

  const d0 = document.getElementById(`sd-${ri}-${ti}-0`);
  const d1 = document.getElementById(`sd-${ri}-${ti}-1`);
  if (d0) { d0.textContent = s0; d0.classList.toggle('winning', t1wins); }
  if (d1) { d1.textContent = s1; d1.classList.toggle('winning', t2wins); }

  const table = ti === 0 ? ROUND_DATA[ri].table1 : ROUND_DATA[ri].table2;
  const winnerTeam = t1wins ? table.t1 : t2wins ? table.t2 : null;
  const wb = document.getElementById(`wb-${ri}-${ti}`);
  if (wb) {
    if (winnerTeam) {
      const avatarHtml = winnerTeam.map(p => avatarImgTag(p, 24)).join('');
      wb.innerHTML = avatarHtml + ' &nbsp;' + winnerTeam.join(' & ') + ' win';
      wb.classList.add('visible');
    } else {
      wb.innerHTML = '';
      wb.classList.remove('visible');
    }
  }
}

function switchRound(ri) {
  currentRound = ri;
  activateRoundView(ri);
  buildRoundNav();
}

function activateRoundView(ri) {
  document.querySelectorAll('.round-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`round-view-${ri}`).classList.add('active');
  document.getElementById('standings-view').classList.remove('active');
  document.getElementById('header-badge').textContent = `Round ${ri+1}`;
}

function showSection(sec) {
  section = sec;
  document.getElementById('nav-rounds').classList.toggle('active', sec === 'rounds');
  document.getElementById('nav-standings').classList.toggle('active', sec === 'standings');
  if (sec === 'rounds') {
    activateRoundView(currentRound);
  } else {
    document.querySelectorAll('.round-view').forEach(v => v.classList.remove('active'));
    const sv = document.getElementById('standings-view');
    sv.classList.add('active');
    document.getElementById('header-badge').textContent = 'Standings';
    renderStandings();
  }
}

function renderStandings() {
  const wins = {};
  PLAYERS.forEach(p => wins[p] = 0);

  ROUND_DATA.forEach((round, ri) => {
    [round.table1, round.table2].forEach((table, ti) => {
      const s = scores[ri][ti];
      const s0 = s[0] === '' ? null : +s[0];
      const s1 = s[1] === '' ? null : +s[1];
      if (s0 === null && s1 === null) return;
      const t1wins = s0 !== null && s0 >= 10 && (s1 === null || s0 > s1);
      const t2wins = s1 !== null && s1 >= 10 && (s0 === null || s1 > s0);
      if (t1wins) table.t1.forEach(p => wins[p]++);
      else if (t2wins) table.t2.forEach(p => wins[p]++);
    });
  });

  const sorted = PLAYERS.slice().sort((a, b) => wins[b] - wins[a]);
  const maxW = Math.max(...Object.values(wins));

  document.getElementById('standings-list').innerHTML = sorted.map((p, i) => {
    const isFirst = i === 0 && maxW > 0;
    return `<div class="standing-row${isFirst ? ' rank-1' : ''}">
      <div class="rank-num">${isFirst ? '♛' : i+1}</div>
      <img class="standing-pip" src="${AVATARS[p]}" alt="${p}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,${isFirst?'0.7':'0.3'});flex-shrink:0;">
      <div class="standing-name">${p}</div>
      <div class="standing-wins">${wins[p]}</div>
      <div class="wins-label">wins</div>
    </div>`;
  }).join('');
}

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Reset all scores?')) {
    scores = ROUND_DATA.map(() => [[0,0],[0,0]]);
    save();
    buildUI();
    if (section === 'standings') renderStandings();
  }
});

buildUI();
</script>
</body>
</html>
